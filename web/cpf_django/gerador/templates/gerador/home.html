<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gerador de CPF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light">

    <div class="container mt-5 p-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="text-center mb-4">
                    <h1 class="titulo text-primary">Gerador de CPF</h1>
                    <p class="text-muted">Gere e valide CPFs facilmente</p>
                </div>
                <div class="card shadow-lg border-0">
                    <div class="card-body">

                        <form method="post" class="mb-4 d-grid gap-2">
                            {% csrf_token %}
                            <button class="btn btn-primary btn-lg" name="gerar_cpf" type="submit">Gerar CPF</button>

                            <div class="alert alert-success text-center fs-5">
                                <strong id="cpfTexto">
                                    {% if cpf %}
                                        {{ cpf }}
                                    {% else %}
                                        {{ ultimo_cpf }}
                                    {% endif %}
                                </strong>
                                <button type="button" class="btn btn-outline-secondary btn-sm ms-2"
                                    onclick="copiar(this, 'cpfTexto')">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                        class="bi bi-copy" viewBox="0 0 16 16">
                                        <path fill-rule="evenodd"
                                            d="M4 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zM2 5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1h1v1a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1v1z" />
                                    </svg>
                                </button>
                            </div>

                            <hr>
                            <h2 class="text-center mb-4">Validação de CPF</h2>

                            <div class="input-group mb-3">
                                <input class="form-control" type="text" name="cpf_digitado"
                                    placeholder="Digite um CPF" value="{{ cpf_digitado }}">
                                <button class="btn btn-dark" name="validar_cpf" type="submit">Validar</button>
                            </div>

                            {% if mensagem %}
                            <div class="alert {% if valido %}alert-success{% else %}alert-danger{% endif %} text-center">
                                {{ mensagem }}
                                {% if valido %}
                                <strong id="txt">{{ cpf_digitado_formatado }}</strong>
                                <button type="button" class="btn btn-outline-secondary btn-sm ms-2"
                                    onclick="copiar(this, 'txt')">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                        class="bi bi-copy" viewBox="0 0 16 16">
                                        <path fill-rule="evenodd"
                                            d="M4 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zM2 5a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1h1v1a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h1v1z" />
                                    </svg>
                                </button>
                                {% endif %}
                            </div>
                            {% endif %}

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        function copiar(botao, id) {
            const texto = document.getElementById(id).innerText;

            navigator.clipboard.writeText(texto).then(() => {
                if (botao) {
                    const svgOriginal = botao.innerHTML;
                    botao.innerText = '✔';
                    setTimeout(() => {
                        botao.innerHTML = svgOriginal;
                    }, 1500);
                }
            });
        }
    </script>

</body>
</html>
